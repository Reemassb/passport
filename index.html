<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Magic Passport — Personalized Storybooks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800&family=Baloo+Bhaijaan+2:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --paper:#FFF8EC; --card:#fff; --ink:#3B2A4A; --ink-soft:#6D5C80;
  --coral:#4A90D9; --coral-deep:#3272B4; --sunny:#FFC948; --teal:#35A7A0;
  --sand:#F5DEB0; --night:#2A2350;
  --radius:22px; --shadow:0 10px 30px rgba(59,42,74,.12);
  --font-display:'Fredoka',sans-serif; --font-body:'Nunito',sans-serif;
}
html[dir=rtl]{
  --font-display:'Baloo Bhaijaan 2',sans-serif;
  --font-body:'Baloo Bhaijaan 2',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-body);background:var(--paper);color:var(--ink);min-height:100vh;
  background-image:
    linear-gradient(180deg, rgba(203,228,255,.55) 0, rgba(255,248,236,0) 340px),
    radial-gradient(circle at 8% 12%, rgba(255,201,72,.14) 0 90px, transparent 90px),
    radial-gradient(circle at 92% 20%, rgba(53,167,160,.10) 0 120px, transparent 120px),
    radial-gradient(circle at 85% 85%, rgba(74,144,217,.10) 0 100px, transparent 100px);
}
.wrap{max-width:760px;margin:0 auto;padding:28px 18px 80px}
.screen{display:none}
.screen.on{display:block;animation:fadein .4s ease}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.screen.on,.page.on{animation:none}}

header{text-align:center;margin-bottom:24px}
.kicker{display:inline-block;font-family:var(--font-display);font-weight:600;font-size:.8rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--teal);
  border:2px solid var(--teal);border-radius:999px;padding:5px 14px;margin-bottom:12px;background:#fff}
html[dir=rtl] .kicker{letter-spacing:0}
h1{font-family:var(--font-display);font-weight:700;font-size:clamp(1.7rem,5vw,2.5rem);line-height:1.15}
h1 .pop{color:var(--coral)}
header p{color:var(--ink-soft);margin-top:8px;font-weight:600}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:26px;border:2px solid rgba(59,42,74,.06);margin-bottom:18px}
h2{font-family:var(--font-display);font-weight:600;font-size:1.25rem;margin-bottom:6px}
.sub{color:var(--ink-soft);font-weight:600;font-size:.92rem;margin-bottom:16px}

label.field{display:block;font-weight:800;font-size:.9rem;margin-bottom:6px}
input[type=text]{width:100%;padding:13px 16px;font:inherit;font-weight:700;font-size:1.05rem;
  border:2px solid rgba(59,42,74,.18);border-radius:14px;background:var(--paper);color:var(--ink)}
input[type=text]:focus{outline:3px solid var(--sunny);border-color:var(--ink)}

.btn{font-family:var(--font-display);font-weight:600;font-size:1.05rem;border:none;cursor:pointer;
  padding:14px 30px;border-radius:999px;color:#fff;background:linear-gradient(135deg,var(--coral),var(--coral-deep));
  box-shadow:0 5px 0 var(--coral-deep);transition:transform .12s, box-shadow .12s}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--coral-deep)}
.btn:focus-visible{outline:3px solid var(--sunny)}
.btn.ghost{background:#fff;color:var(--ink);box-shadow:0 4px 0 rgba(59,42,74,.15);border:2px solid rgba(59,42,74,.15)}
.btn.small{font-size:.9rem;padding:9px 18px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.center{text-align:center}
.row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* language picker */
.langpick{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.langpick button{
  font-family:'Baloo Bhaijaan 2','Fredoka',sans-serif;font-size:1.5rem;font-weight:700;
  padding:26px 44px;border-radius:22px;border:3px solid rgba(59,42,74,.12);background:#fff;
  color:var(--ink);cursor:pointer;box-shadow:var(--shadow);transition:transform .15s,border-color .15s}
.langpick button:hover{transform:translateY(-4px);border-color:var(--coral)}
.langpick small{display:block;font-size:.85rem;color:var(--ink-soft);font-weight:600;margin-top:4px}

/* country picker (passport pages) */
.themepick{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-top:8px}
.themepick button{
  font-family:var(--font-display);font-weight:600;font-size:1.1rem;color:var(--ink);cursor:pointer;
  padding:22px 14px;border-radius:22px;border:3px solid rgba(59,42,74,.12);background:#fff;
  box-shadow:var(--shadow);transition:transform .15s,border-color .15s;text-align:center;position:relative}
.themepick button:hover:not(:disabled){transform:translateY(-4px);border-color:var(--coral);
  box-shadow:0 14px 34px rgba(74,144,217,.28)}
.themepick .ticon{font-size:2.2rem;display:flex;align-items:center;justify-content:center;
  width:76px;height:76px;border-radius:50%;background:var(--paper);
  border:3px dashed rgba(74,144,217,.5);margin:0 auto 10px}
.themepick small{display:block;font-family:var(--font-body);font-weight:600;font-size:.83rem;color:var(--ink-soft);margin-top:6px}
.themepick button:disabled{cursor:default;opacity:.75;background:var(--paper);border-style:dashed}
.themepick button:disabled .ticon{border-color:rgba(59,42,74,.2);filter:grayscale(.35)}
.themepick button:disabled:hover{transform:none;border-color:rgba(59,42,74,.12)}
.soon{display:block;width:max-content;margin:10px auto 0;font-family:var(--font-body);font-weight:800;font-size:.7rem;
  letter-spacing:.05em;text-transform:uppercase;color:#C0574A;border:2px solid #C0574A;
  background:transparent;border-radius:8px;padding:3px 10px;transform:rotate(-5deg)}
html[dir=rtl] .soon{letter-spacing:0;transform:rotate(5deg)}
.ticon img{width:46px;height:auto;border-radius:8px;box-shadow:0 2px 6px rgba(59,42,74,.2)}

/* gender pick */
.pills{display:flex;gap:10px;flex-wrap:wrap}
.pills button{font:inherit;font-weight:800;font-size:1rem;padding:11px 22px;border-radius:999px;
  border:2px solid rgba(59,42,74,.18);background:#fff;color:var(--ink-soft);cursor:pointer}
.pills button.on{background:var(--teal);border-color:var(--teal);color:#fff}

/* upload */
.upload-zone{border:3px dashed rgba(59,42,74,.25);border-radius:18px;padding:24px;text-align:center;
  cursor:pointer;transition:.2s;background:var(--paper)}
.upload-zone:hover{border-color:var(--coral);background:#FFF3E8}
.upload-zone .emoji{font-size:2rem;display:block;margin-bottom:6px}
.upload-zone strong{font-family:var(--font-display);font-weight:600;display:block;margin-bottom:4px}
.upload-zone span{color:var(--ink-soft);font-weight:600;font-size:.9rem}
#fileInput{display:none}
.thumb{display:none;margin:14px auto 0;width:130px;height:130px;border-radius:20px;object-fit:cover;
  box-shadow:var(--shadow);border:3px solid #fff}
.privacy{margin-top:12px;font-size:.82rem;color:var(--ink-soft);font-weight:600;text-align:center}
.phototips{margin-top:10px;font-size:.85rem;font-weight:700;color:var(--teal);text-align:center}

.notice{padding:13px 16px;border-radius:14px;font-weight:700;font-size:.92rem;margin-top:14px;display:none}
.notice.err{display:block;background:#FDEAEA;color:#B3261E}
.notice.ok{display:block;background:#E6F6EC;color:#1F7A3D}
.credits{font-size:.85rem;font-weight:800;color:var(--teal);text-align:center;margin-top:10px}

/* character approval */
.charbox{display:flex;flex-direction:column;align-items:center;gap:16px}
.charbox img{width:min(340px,84vw);border-radius:22px;box-shadow:var(--shadow)}

/* progress */
.progress-wrap{margin-top:8px}
.bigbar{height:18px;border-radius:999px;background:#EFE6D4;overflow:hidden;box-shadow:inset 0 2px 4px rgba(59,42,74,.08)}
.bigbar div{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--sunny),var(--coral));transition:width .6s ease}
.progmsg{text-align:center;font-family:var(--font-display);font-weight:600;font-size:1.1rem;margin-top:16px;min-height:1.5em}
.progsub{text-align:center;color:var(--ink-soft);font-weight:700;font-size:.85rem;margin-top:6px}
.thumbrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:18px}
.thumbrow .t{width:56px;height:56px;border-radius:12px;background:#EFE6D4;display:flex;align-items:center;
  justify-content:center;font-size:1.1rem;overflow:hidden;box-shadow:var(--shadow)}
.thumbrow .t img{width:100%;height:100%;object-fit:cover}

/* book */
.book{position:relative;max-width:560px;margin:0 auto;border-radius:26px;overflow:hidden;
  box-shadow:0 20px 50px rgba(42,35,80,.28);background:var(--night)}
.page{display:none}
.page.on{display:block;animation:pagein .5s ease}
@keyframes pagein{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
.page img.illu{width:100%;display:block;aspect-ratio:1;object-fit:cover;background:#EFE6D4}
.caption{background:#FFFDF6;padding:20px 26px 22px;text-align:center;position:relative}
.caption::before{content:'';position:absolute;top:0;left:8%;right:8%;height:3px;border-radius:3px;background:var(--sunny)}
.caption .booktitle{font-family:var(--font-display);font-weight:700;font-size:1.5rem;line-height:1.25;margin-bottom:4px}
.caption p{font-size:1.1rem;font-weight:700;line-height:1.6}
.caption .kidname{color:var(--coral);font-family:var(--font-display);font-weight:700}
.pageno{font-size:.75rem;letter-spacing:.1em;color:var(--ink-soft);font-weight:800;margin-top:10px;text-transform:uppercase}
html[dir=rtl] .pageno{letter-spacing:0}
.booknav{display:flex;justify-content:center;gap:12px;margin-top:18px;flex-wrap:wrap}
.pagefix{text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">

<!-- ============ SCREEN 0: LANGUAGE ============ -->
<section class="screen on" id="s-lang">
  <header>
    <div class="kicker">The Magic Passport ✈️ جواز السفر السحري</div>
    <h1>Choose your language<br>اختر لغة القصة</h1>
    <p style="font-size:1.5rem;margin-top:12px">🌍 ✈️ 🗺️ 🧳</p>
  </header>
  <div class="langpick">
    <button onclick="setLang('ar')">العربية<small>قصة بالعربية</small></button>
    <button onclick="setLang('en')">English<small>Story in English</small></button>
  </div>
</section>

<!-- ============ SCREEN 1: ACCESS CODE ============ -->
<section class="screen" id="s-code">
  <header>
    <div class="kicker" data-t="kicker"></div>
    <h1 data-t="codeTitle"></h1>
    <p data-t="codeSub"></p>
  </header>
  <div class="card">
    <label class="field" for="codeInput" data-t="codeLabel"></label>
    <input type="text" id="codeInput" autocomplete="off" placeholder="XXXX-XXXX-XXXX" style="text-transform:uppercase">
    <div class="notice" id="codeNotice"></div>
    <div class="center" style="margin-top:18px">
      <button class="btn" id="codeBtn" onclick="checkCode()" data-t="codeBtn"></button>
    </div>
  </div>
</section>

<!-- ============ SCREEN 2: COUNTRY PICKER ============ -->
<section class="screen" id="s-theme">
  <header>
    <div class="kicker" data-t="kicker"></div>
    <h1 data-t="themeTitle"></h1>
    <p data-t="themeSub"></p>
  </header>
  <div class="themepick" id="themePick"></div>
</section>

<!-- ============ SCREEN 3: CHILD SETUP ============ -->
<section class="screen" id="s-setup">
  <header>
    <div class="kicker" data-t="kicker"></div>
    <h1 data-t="setupTitle"></h1>
    <p data-t="setupSub"></p>
  </header>
  <div class="card">
    <label class="field" for="kidName" data-t="nameLabel"></label>
    <input type="text" id="kidName" maxlength="20" autocomplete="off">
    <div style="height:16px"></div>
    <label class="field" data-t="genderLabel"></label>
    <div class="pills" id="genderPills">
      <button data-g="boy" data-t="boy"></button>
      <button data-g="girl" data-t="girl"></button>
    </div>
    <div style="height:16px"></div>
    <label class="field" data-t="photoLabel"></label>
    <div class="upload-zone" id="dropZone">
      <span class="emoji">📷</span>
      <strong data-t="photoTitle"></strong>
      <span data-t="photoHint"></span>
    </div>
    <input type="file" id="fileInput" accept="image/*">
    <img class="thumb" id="thumb" alt="">
    <p class="phototips" data-t="photoTips"></p>
    <p class="privacy" data-t="privacy"></p>
    <div class="notice" id="setupNotice"></div>
    <div class="center" style="margin-top:18px">
      <button class="btn" id="setupBtn" onclick="startCharacter()" disabled data-t="setupBtn"></button>
    </div>
    <p class="credits" id="creditsLine1"></p>
  </div>
</section>

<!-- ============ SCREEN 4: CHARACTER APPROVAL ============ -->
<section class="screen" id="s-char">
  <header>
    <div class="kicker" data-t="kicker"></div>
    <h1 data-t="charTitle"></h1>
    <p data-t="charSub"></p>
  </header>
  <div class="card charbox">
    <div class="progress-wrap" id="charProgress" style="width:100%">
      <div class="bigbar"><div id="charBar"></div></div>
      <div class="progmsg" id="charMsg"></div>
    </div>
    <img id="charImg" style="display:none" alt="Cartoon character">
    <div class="row" id="charActions" style="display:none">
      <button class="btn" onclick="approveCharacter()" data-t="charApprove"></button>
      <button class="btn ghost" onclick="regenCharacter()" data-t="charRetry"></button>
    </div>
    <div class="notice" id="charNotice"></div>
    <p class="credits" id="creditsLine2"></p>
  </div>
</section>

<!-- ============ SCREEN 5: GENERATING PAGES ============ -->
<section class="screen" id="s-gen">
  <header>
    <div class="kicker" data-t="kicker"></div>
    <h1 data-t="genTitle"></h1>
    <p data-t="genSub"></p>
  </header>
  <div class="card">
    <div class="progress-wrap">
      <div class="bigbar"><div id="genBar"></div></div>
      <div class="progmsg" id="genMsg"></div>
      <div class="progsub" id="genSubMsg"></div>
      <div class="thumbrow" id="thumbRow"></div>
    </div>
    <div class="notice" id="genNotice"></div>
    <div class="center" id="genRetryWrap" style="display:none;margin-top:16px">
      <button class="btn" onclick="resumeGeneration()" data-t="genRetry"></button>
    </div>
  </div>
</section>

<!-- ============ SCREEN 6: THE BOOK ============ -->
<section class="screen" id="s-book">
  <header>
    <div class="kicker" data-t="kicker"></div>
    <h1 data-t="bookTitle"></h1>
    <p data-t="bookSub"></p>
  </header>
  <div class="book" id="book"></div>
  <div class="booknav">
    <button class="btn ghost" id="prevBtn" data-t="back"></button>
    <button class="btn" id="nextBtn" data-t="next"></button>
  </div>
  <div class="pagefix">
    <button class="btn ghost small" id="regenPageBtn" onclick="regenCurrentPage()" data-t="regenPage"></button>
  </div>
  <div class="center" style="margin-top:22px">
    <button class="btn" id="pdfBtn" onclick="downloadPDF()" data-t="pdf"></button>
  </div>
  <div class="notice" id="bookNotice"></div>
  <p class="credits" id="creditsLine3"></p>
</section>

</div>

<script>
(function(){
"use strict";

/* ==================== CONFIG ==================== */
const WORKER_URL = "https://storybook.reemafahmi.workers.dev";
const PRODUCT    = "passport";   // tells the Worker which Gumroad product this app belongs to

const CHAR_BASE = "This is a photo of a real child (a young {GENDER}). Create the SAME child as a cartoon character in soft 3D animated movie style. It is very important that the character is instantly recognizable as this exact child: keep the same face shape, eye shape and eye color, eyebrows, nose, mouth and smile, skin tone, and the exact same hairstyle and hair color. Apply only gentle stylization (soft smooth skin, slightly larger eyes, clean cartoon shading) and do not change the child's identity or facial features. {OUTFIT} Full body, standing, friendly smile, plain warm cream background. No text.";

const SUFFIX_BASE = " Children's picture book illustration, soft 3D animated movie style, {PALETTE}, gentle lighting, wide composition. The attached image is the character reference: draw the exact same child with identical facial features, eyes, nose, mouth, skin tone, hairstyle, hair color and outfit — the face must stay clearly visible and recognizable in the scene. No text or letters in the image.";

/* ==================== COUNTRIES ==================== */
const COUNTRIES = {

/* ---------------- KUWAIT 🇰🇼 ---------------- */
kuwait: {
  icon:"🇰🇼",
  flag:"kw",
  name:{en:"Kuwait",ar:"الكويت"},
  tag:{en:"The Towers, the souq & the pearl story",ar:"الأبراج والسوق وحكاية اللؤلؤ"},
  outfit:{
    boy:"Dress the character in a traditional Kuwaiti white dishdasha — a simple, elegant ankle-length white robe with a small neat collar — with no head covering, so the hairstyle and full face stay clearly visible.",
    girl:"Dress the character in a traditional Kuwaiti girls' darraa'a — a festive, colorful dress with rich golden embroidery — with no head covering, so the hairstyle and full face stay clearly visible."
  },
  palette:"warm Arabian Gulf palette of turquoise sea, golden sand and soft pearl-white light",
  fun:{
    en:["Polishing the Kuwait Towers… 🗼","Teaching Shaheen the falcon to wave… 🦅","Raising the dhow's big white sail… ⛵","Framing the old sailor's photograph… 🖼️","Brewing sweet tea in the desert tent… ☕","Lighting the souq lanterns… 🏮"],
    ar:["نلمّع أبراج الكويت… 🗼","نعلّم الصقر شاهين أن يلوّح… 🦅","نرفع شراع البوم الأبيض… ⛵","نضع صورة البحّار القديمة في الإطار… 🖼️","نجهّز الشاي في خيمة الصحراء… ☕","نضيء فوانيس السوق… 🏮"]
  },
  story:[
  { prompt:"The character stands happily on a sunny seaside promenade in Kuwait City, a majestic friendly falcon with warm kind eyes perched gently on their arm, the iconic Kuwait Towers with blue-green mosaic spheres rising behind, calm turquoise sea and soft clear sky, warm welcoming mood.",
    en:n=>({title:`${n}'s Journey in Kuwait`, text:"A story about a beautiful day in Kuwait."}),
    ar:(n,g)=>({title:`رحلة ${n} في الكويت`, text:"قصة عن يومٍ جميلٍ في الكويت."}) },
  { prompt:"The character stands on a seaside promenade on a bright calm morning, holding a small softly glowing magical passport in both hands, a majestic friendly falcon with warm kind eyes landing gently beside them, the Kuwait Towers with blue-green mosaic spheres in the background over a calm turquoise sea.",
    en:n=>({text:`The magic passport glowed softly in ${n}'s hands — and suddenly ${n} was standing by the calm blue sea in Kuwait, on a bright sunny morning. A friendly falcon landed nearby. "Welcome, ${n}! I'm Shaheen," he said kindly. "Would you like me to show you my beautiful country today?"`}),
    ar:(n,g)=> g==="boy"
     ? ({text:`توهّج الجوازُ السحريُّ بهدوءٍ بين يدي ${n}، وفجأةً وجد نفسه واقفًا أمام البحر الأزرق الهادئ في الكويت، وشمسُ الصباح تملأ المكان بضوءٍ جميل. حطّ صقرٌ لطيفٌ قربه وقال بودّ: "أهلًا بك يا ${n}! أنا شاهين. هل تحب أن أريك بلدي الجميل اليوم؟"`})
     : ({text:`توهّج الجوازُ السحريُّ بهدوءٍ بين يدي ${n}، وفجأةً وجدت نفسها واقفةً أمام البحر الأزرق الهادئ في الكويت، وشمسُ الصباح تملأ المكان بضوءٍ جميل. حطّ صقرٌ لطيفٌ قربها وقال بودّ: "أهلًا بكِ يا ${n}! أنا شاهين. هل تحبين أن أريكِ بلدي الجميل اليوم؟"`}) },
  { prompt:"The character and the friendly falcon stand on the high observation deck inside the big blue-green sphere at the top of the Kuwait Towers, looking out through tall windows over the sparkling city and calm turquoise sea far below, soft morning light, peaceful and amazed mood.",
    en:n=>({text:`First stop: the Kuwait Towers! Up, up they went to the big blue sphere at the very top, and from up there they could see the whole city and the wide blue sea. "Did you know the towers keep water for the city?" said Shaheen. "They are Kuwait's most famous landmark."`}),
    ar:(n,g)=> g==="boy"
     ? ({text:`المحطة الأولى: أبراج الكويت! صعد ${n} وشاهين عاليًا إلى الكرة الزرقاء الكبيرة في القمة، وشاهدا من الأعلى المدينةَ كلَّها والبحرَ الواسع. فقال شاهين: "هل تعلم أن الأبراج تخزّن الماء للمدينة؟ إنها أشهر معالم الكويت."`})
     : ({text:`المحطة الأولى: أبراج الكويت! صعدت ${n} وشاهين عاليًا إلى الكرة الزرقاء الكبيرة في القمة، وشاهدا من الأعلى المدينةَ كلَّها والبحرَ الواسع. فقال شاهين: "هل تعلمين أن الأبراج تخزّن الماء للمدينة؟ إنها أشهر معالم الكويت."`}) },
  { prompt:"The character explores a lively traditional Arabian souq street with wooden shutters, hanging lanterns, colorful sacks of spices and baskets of golden dates, a kind old shopkeeper warmly offering the character a date, the friendly falcon perched on a wooden beam above, warm cozy light.",
    en:n=>({text:`Next, they walked together into Souq Al-Mubarakiya, where the air smelled of spices, coffee and sweet dates. A kind shopkeeper smiled and offered ${n} a soft, sweet date. "This souq is more than two hundred years old," he said. "Everyone in Kuwait loves it." And ${n} loved it too.`}),
    ar:(n,g)=> g==="boy"

/* ==================== LOCAL SAVE (IndexedDB) ==================== */
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("world-passport",1);
    r.onupgradeneeded=()=>r.result.createObjectStore("books");
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function idbSet(k,v){
  const d=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=d.transaction("books","readwrite");
    tx.objectStore("books").put(v,k);
    tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
  });
}
async function idbGet(k){
  const d=await idbOpen();
  return new Promise((res,rej)=>{
    const q=d.transaction("books","readonly").objectStore("books").get(k);
    q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error);
  });
}
async function saveBook(){
  if(!S.code||!S.theme) return;
  try{
    await idbSet(S.code,{lang:S.lang,theme:S.theme,name:S.name,gender:S.gender,
      character:S.character,pages:S.pages,ts:Date.now()});
  }catch(e){/* storage full or unavailable — the app still works, just without resume */}
}

/* ==================== API ==================== */
async function api(path,payload){
  const r=await fetch(WORKER_URL+path,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify(Object.assign({product:PRODUCT},payload))
  });
  return r.json();
}
async function generateImage(refDataURL,prompt){
  const data=await api("/generate",{code:S.code,photo:refDataURL,prompt,country:S.theme});
  if(data.error) throw new Error(data.error);
  S.credits=data.credits; updCredits();
  return "data:image/png;base64,"+data.image;
}

/* ==================== SCREEN 1: CODE ==================== */
window.checkCode = async function(){
  const n=$("codeNotice"); n.className="notice";
  const code=$("codeInput").value.trim().toUpperCase();
  if(!code) return;
  $("codeBtn").disabled=true; $("codeBtn").textContent=t("codeChecking");
  try{
    const data=await api("/check",{code});
    if(!data.valid){
      n.className="notice err";
      n.textContent=data.error||t("codeBad");
    }
    else if(data.credits<=0 && !data.country){ n.className="notice err"; n.textContent=t("codeEmpty"); }
    else{
      S.code=code; S.credits=data.credits; updCredits();
      S.lockedCountry = (data.country && COUNTRIES[data.country]) ? data.country : null;
      try{ S.saved=await idbGet(code)||null; }catch(e){ S.saved=null; }
      renderCountryPicker();
      show("s-theme");
    }
  }catch(e){ n.className="notice err"; n.textContent=t("netErr"); }
  $("codeBtn").disabled=false; $("codeBtn").textContent=t("codeBtn");
};

    const note=document.createElement("p");
    note.style.cssText="grid-column:1/-1;text-align:center;font-weight:800;color:var(--teal)";
    note.textContent=t("lockedNote")+" "+th.icon+" "+th.name[S.lang];
    box.appendChild(note);
  }
  Object.entries(COUNTRIES).forEach(([id,th])=>{
    const b=document.createElement("button");
    b.innerHTML='<span class="ticon"><img src="https://flagcdn.com/w80/'+th.flag+'.png" alt="'+th.name[S.lang]+'"></span>'+th.name[S.lang]+
      '<small>'+th.tag[S.lang]+'</small>';
    if(S.lockedCountry && S.lockedCountry!==id){
      b.disabled=true;
    } else {
      b.onclick=()=>{ pickCountry(id); };
    }
    box.appendChild(b);
  });
  COMING_SOON.forEach(cs=>{
    const b=document.createElement("button");
    b.disabled=true;
    b.innerHTML='<span class="ticon"><img src="https://flagcdn.com/w80/'+cs.flag+'.png" alt="'+cs.name[S.lang]+'"></span>'+cs.name[S.lang]+
      '<span class="soon">'+t("soon")+'</span>';
    box.appendChild(b);
  });
}
function escStr(x){return String(x).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
window.resumeSaved=function(){
  const sv=S.saved;
  if(!sv) return;
  if(sv.lang!==S.lang) setLangSilent(sv.lang);
  S.theme=sv.theme; S.name=sv.name; S.gender=sv.gender;
  S.character=sv.character; S.pages=sv.pages.slice();
  const missing=S.pages.findIndex(p=>!p);
  if(missing===-1){
    S.page=0; renderBook(); show("s-book");
  } else {
    show("s-gen"); buildThumbRow();
    S.genIndex=missing; runGeneration();
  }
};
function setLangSilent(l){
  S.lang=l;
  document.documentElement.lang=l==="ar"?"ar":"en";
  document.documentElement.dir=l==="ar"?"rtl":"ltr";
  document.querySelectorAll("[data-t]").forEach(el=>{
    const k=el.getAttribute("data-t");
    if(T[l][k]) el.textContent=T[l][k];
  });
  updCredits();
}
function pickCountry(id){
  if(S.saved && S.saved.character){
    const th=COUNTRIES[S.saved.theme];
    const done=S.saved.pages.filter(Boolean).length, total=S.saved.pages.length;
    const desc=th.icon+" "+th.name[S.saved.lang]+" — "+S.saved.name+(done<total?" ("+done+"/"+total+")":"");
    if(!confirm(t("resumeConfirm").replace("{BOOK}",desc))) return;
    S.saved=null;
  }
  S.theme=id;
  S.pages=new Array(COUNTRIES[id].story.length).fill(null);
  S.character=null;
  show("s-setup");
}

/* ==================== SCREEN 3: SETUP ==================== */
$("genderPills").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  document.querySelectorAll("#genderPills button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); S.gender=b.dataset.g; validateSetup();
});
$("kidName").addEventListener("input",validateSetup);
$("dropZone").addEventListener("click",()=>$("fileInput").click());
$("fileInput").addEventListener("change",async ()=>{
  const f=$("fileInput").files[0]; if(!f) return;
  if(!f.type.startsWith("image/")) return;
  S.photo=await downscale(f,1024);
  $("thumb").src=S.photo; $("thumb").style.display="block";
  validateSetup();
});
async function downscale(file,maxSide){
  let bmp;
  try{ bmp=await createImageBitmap(file,{imageOrientation:"from-image"}); }
  catch(e){
    bmp=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=URL.createObjectURL(file);});
  }
  const w=bmp.width||bmp.naturalWidth,h=bmp.height||bmp.naturalHeight;
  const k=Math.min(1,maxSide/Math.max(w,h));
  const c=document.createElement("canvas");
  c.width=Math.round(w*k);c.height=Math.round(h*k);
  const ctx=c.getContext("2d"); ctx.imageSmoothingQuality="high";
  ctx.drawImage(bmp,0,0,c.width,c.height);
  return c.toDataURL("image/jpeg",0.87);
}
function validateSetup(){
  S.name=$("kidName").value.trim();
  $("setupBtn").disabled=!(S.name && S.gender && S.photo);
}

/* ==================== SCREEN 4: CHARACTER ==================== */
let charMsgTimer=null;
window.startCharacter=function(){ show("s-char"); makeCharacter(); };

function characterPrompt(){
  const o=COUNTRIES[S.theme].outfit;
  const outfit = typeof o==="string" ? o : o[S.gender==="boy"?"boy":"girl"];
  return CHAR_BASE
    .replace("{GENDER}", S.gender==="boy"?"boy":"girl")
    .replace("{OUTFIT}", outfit);
}
function sceneSuffix(){
  return SUFFIX_BASE.replace("{PALETTE}", COUNTRIES[S.theme].palette);
}

async function makeCharacter(){
  if(S.busy) return; S.busy=true;
  $("charImg").style.display="none";
  $("charActions").style.display="none";
  $("charNotice").className="notice";
  $("charProgress").style.display="block";
  animateBar("charBar",45000);
  let mi=0;
  $("charMsg").textContent=t("charWorking")[0];
  charMsgTimer=setInterval(()=>{mi=(mi+1)%t("charWorking").length;$("charMsg").textContent=t("charWorking")[mi];},4000);
  try{
    const img=await generateImage(S.photo,characterPrompt());
    S.character=img;
    saveBook();
    $("charImg").src=img; $("charImg").style.display="block";
    $("charActions").style.display="flex";
  }catch(e){
    $("charNotice").className="notice err";
    $("charNotice").textContent=(e.message||t("netErr"));
    $("charActions").style.display="flex";
  }
  clearInterval(charMsgTimer);
  $("charProgress").style.display="none";
  S.busy=false;
}
window.regenCharacter=()=>makeCharacter();
window.approveCharacter=function(){
  show("s-gen");
  buildThumbRow();
  S.genIndex=0;
  runGeneration();
};

/* ==================== SCREEN 5: GENERATION ==================== */
let funTimer=null;
function buildThumbRow(){
  const row=$("thumbRow"); row.innerHTML="";
  story().forEach((_,i)=>{
    const d=document.createElement("div");
    d.className="t"; d.id="thumb-"+i; d.textContent="🖌️";
    row.appendChild(d);
  });
  S.pages.forEach((p,i)=>{ if(p) $("thumb-"+i).innerHTML='<img src="'+p+'">'; });
}
function animateBar(id,ms){
  const bar=$(id); bar.style.transition="none"; bar.style.width="4%";
  requestAnimationFrame(()=>{bar.style.transition="width "+ms+"ms linear";bar.style.width="92%";});
}
async function runGeneration(){
  if(S.busy) return; S.busy=true;
  $("genNotice").className="notice";
  $("genRetryWrap").style.display="none";
  const fun=COUNTRIES[S.theme].fun[S.lang];
  let fi=0;
  clearInterval(funTimer);
  funTimer=setInterval(()=>{fi=(fi+1)%fun.length;$("genSubMsg").textContent=fun[fi];},5000);
  $("genSubMsg").textContent=fun[0];

  const st=story();
  for(let i=S.genIndex;i<st.length;i++){
    S.genIndex=i;
    $("genMsg").textContent=t("genPage")+" "+(i+1)+" "+t("genOf")+" "+st.length;
    $("genBar").style.transition="width .6s ease";
    $("genBar").style.width=Math.round(i/st.length*100)+"%";
    if(S.pages[i]) continue;
    try{
      const img=await tryTwice(()=>generateImage(S.character, st[i].prompt+sceneSuffix()));
      S.pages[i]=img;
      saveBook();
      $("thumb-"+i).innerHTML='<img src="'+img+'">';
    }catch(e){
      clearInterval(funTimer);
      $("genNotice").className="notice err";
      $("genNotice").textContent=t("genErr")+(e.message||t("netErr"));
      $("genRetryWrap").style.display="block";
      S.busy=false;
      return;
    }
  }
  clearInterval(funTimer);
  $("genBar").style.width="100%";
  S.busy=false;
  S.page=0;
  renderBook();
  show("s-book");
}
async function tryTwice(fn){
  try{ return await fn(); }
  catch(e){
    if(/credit|code|country/i.test(e.message)) throw e;
    return await fn();
  }
}
window.resumeGeneration=()=>runGeneration();

/* ==================== SCREEN 6: BOOK ==================== */
function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function pageText(i){
  const sc=story()[i];
  const fn=S.lang==="ar"?sc.ar:sc.en;
  return fn(S.name,S.gender);
}
function renderBook(){
  const st=story();
  $("book").innerHTML=st.map((sc,i)=>{
    const pt=pageText(i);
    const nameHTML='<span class="kidname">'+esc(S.name)+'</span>';
    const body=esc(pt.text).split(esc(S.name)).join(nameHTML);
    const label=i===0?"":t("page")+" "+i;
    return '<article class="page'+(i===S.page?" on":"")+'">'+
      '<img class="illu" src="'+(S.pages[i]||"")+'" alt="">'+
      '<div class="caption">'+
        (pt.title?'<div class="booktitle">'+esc(pt.title).split(esc(S.name)).join(nameHTML)+'</div>':'')+
        '<p>'+body+'</p>'+
        (label?'<div class="pageno">'+label+'</div>':'')+
      '</div></article>';
  }).join("");
  $("prevBtn").disabled=S.page===0;
  $("nextBtn").disabled=S.page===st.length-1;
  $("nextBtn").textContent=S.page===st.length-1?t("theEnd"):t("next");
}
$("prevBtn").addEventListener("click",()=>{if(S.page>0){S.page--;renderBook();}});
$("nextBtn").addEventListener("click",()=>{if(S.page<story().length-1){S.page++;renderBook();}});

window.regenCurrentPage=async function(){
  if(S.busy) return; S.busy=true;
  const i=S.page,n=$("bookNotice");
  n.className="notice";
  $("regenPageBtn").disabled=true;
  $("regenPageBtn").textContent="🖌️ …";
  try{
    const img=await generateImage(S.character, story()[i].prompt+sceneSuffix());
    S.pages[i]=img; saveBook(); renderBook();
  }catch(e){ n.className="notice err"; n.textContent=(e.message||t("netErr")); }
  $("regenPageBtn").disabled=false;
  $("regenPageBtn").textContent=t("regenPage");
  S.busy=false;
};

/* ==================== PDF ==================== */
window.downloadPDF=async function(){
  if(S.busy) return; S.busy=true;
  const btn=$("pdfBtn"); btn.disabled=true; btn.textContent=t("pdfWorking");
  try{
    await document.fonts.ready;
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({unit:"mm",format:"a4",orientation:"portrait"});
    const st=story();
    for(let i=0;i<st.length;i++){
      if(i>0) pdf.addPage();
      const cnv=await composePage(i);
      pdf.addImage(cnv.toDataURL("image/jpeg",0.92),"JPEG",0,0,210,297);
    }
    const countryName=COUNTRIES[S.theme].name[S.lang].replace(/\s+/g,"-");
    const fname=(S.lang==="ar"?"قصة-":"storybook-")+S.name+"-"+countryName+".pdf";
    pdf.save(fname);
  }catch(e){
    const n=$("bookNotice"); n.className="notice err"; n.textContent=e.message;
  }
  btn.disabled=false; btn.textContent=t("pdf");
  S.busy=false;
};

async function composePage(i){
  const W=1240,H=1754;
  const c=document.createElement("canvas"); c.width=W;c.height=H;
  const x=c.getContext("2d");
  const ar=S.lang==="ar";
  const dispFont=ar?"'Baloo Bhaijaan 2'":"'Fredoka'";
  const bodyFont=ar?"'Baloo Bhaijaan 2'":"'Nunito'";
  x.fillStyle="#FFF8EC"; x.fillRect(0,0,W,H);
  x.fillStyle="#F5DEB0";
  x.beginPath(); x.arc(W-90,90,140,0,7); x.fill();
  x.beginPath(); x.arc(70,H-70,110,0,7); x.fill();
  const img=await loadImg(S.pages[i]);
  const iw=W-260, ix=130, iy=80;
  roundImage(x,img,ix,iy,iw,iw,36);
  x.strokeStyle="#fff"; x.lineWidth=10;
  roundRectPath(x,ix,iy,iw,iw,36); x.stroke();
  const pt=pageText(i);
  x.textAlign="center"; x.fillStyle="#3B2A4A"; x.direction=ar?"rtl":"ltr";
  let ty=iy+iw+90;
  if(pt.title){
    x.font="700 60px "+dispFont;
    ty=wrapText(x,pt.title,W/2,ty,W-220,74);
    ty+=24;
  }
  x.font="700 42px "+bodyFont;
  ty=wrapText(x,pt.text,W/2,ty,W-240,62);
  if(i>0){
    x.font="600 26px "+dispFont; x.fillStyle="#6D5C80";
    const pageY=Math.min(H-46, ty+54);
    x.fillText(t("page")+" "+i, W/2, pageY);
  }
  return c;
}
function loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
function roundRectPath(x,px,py,w,h,r){
  x.beginPath();
  x.moveTo(px+r,py); x.arcTo(px+w,py,px+w,py+h,r); x.arcTo(px+w,py+h,px,py+h,r);
  x.arcTo(px,py+h,px,py,r); x.arcTo(px,py,px+w,py,r); x.closePath();
}
function roundImage(x,img,px,py,w,h,r){
  x.save(); roundRectPath(x,px,py,w,h,r); x.clip();
  x.drawImage(img,px,py,w,h); x.restore();
}
function wrapText(x,text,cx,y,maxW,lineH){
  const words=text.split(" ");
  let line="";
  for(const w of words){
    const test=line?line+" "+w:w;
    if(x.measureText(test).width>maxW && line){
      x.fillText(line,cx,y); y+=lineH; line=w;
    } else line=test;
  }
  if(line){ x.fillText(line,cx,y); y+=lineH; }
  return y;
}

})();
</script>
