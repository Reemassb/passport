<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Passport diagnostic</title>
<style>
body{font-family:system-ui,sans-serif;max-width:640px;margin:40px auto;padding:0 18px;color:#222}
h1{font-size:1.3rem}
label{display:block;font-weight:700;margin:14px 0 4px}
input,select{width:100%;padding:10px;font-size:1rem;border:2px solid #ccc;border-radius:8px}
button{margin-top:16px;padding:12px 26px;font-size:1rem;font-weight:700;border:0;border-radius:999px;
background:#4A90D9;color:#fff;cursor:pointer}
pre{background:#f4f4f6;padding:14px;border-radius:10px;white-space:pre-wrap;word-break:break-all;margin-top:18px}
</style>
</head>
<body>
<h1>Magic Passport — Gumroad diagnostic</h1>
<p>Temporary tool. Tells us exactly what Gumroad replies when the Worker checks a license key.</p>

<label>Admin password (your ADMIN_KEY)</label>
<input id="admin" type="password" autocomplete="off">

<label>License key to test</label>
<input id="key" value="87AAE45E-B8554E23-B00B1FCD-6C686BDE">

<label>Check against which product?</label>
<select id="which">
  <option value="passport">passport (The Magic Passport)</option>
  <option value="adventures">adventures (Little Explorer)</option>
</select>

<button onclick="run()">Run check</button>
<pre id="out">(results appear here)</pre>

<script>
async function run(){
  const out=document.getElementById("out");
  out.textContent="checking…";
  try{
    const r=await fetch("https://storybook.reemafahmi.workers.dev/admin/debug",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        admin:document.getElementById("admin").value,
        key:document.getElementById("key").value,
        which:document.getElementById("which").value
      })
    });
    const d=await r.json();
    out.textContent=JSON.stringify(d,null,2);
  }catch(e){ out.textContent="Network error: "+e.message; }
}
</script>
</body>
</html>
